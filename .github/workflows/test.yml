# This workflow will do an install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Tests

on:
  workflow_run:
    workflows: [Update Sets]
    types: [completed]
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    # Align with the Deploy workflow's setup (actions/setup-node@v4 +
    # Node 20) so optional native deps (lightningcss, rollup) resolve
    # consistently. The upstream Zarel/setup-node@patch-1 + Node 18
    # combo got us a "Cannot find native binding" error on lightningcss
    # even with the lockfile dropped — official setup-node + Node 20
    # handles the optional-deps fetch cleanly.
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
    # Lockfile is generated on Windows so it omits @rollup/rollup-linux-x64-gnu
    # (npm 7+ bug — https://github.com/npm/cli/issues/4828). Drop it before
    # install so npm re-resolves on Linux and pulls the right native binary.
    # Mirrors the workaround in deploy-champions.yml.
    - run: rm -f package-lock.json
    - run: npm install
    # Compile the calc workspace so the app build below has the latest
    # dist/ to import from. We do NOT run `npm run test` at the root —
    # that would also run calc's upstream Jest suite, which compares
    # calc's hardcoded data tables against @pkmn/dex's live data and
    # fails whenever @pkmn/dex publishes a data-shape patch (e.g. the
    # Rapid Spin `secondaries: true` shape). Upstream Smogon maintains
    # those tables; on this fork we only own the app workspace, so we
    # scope CI to that.
    - run: npm --workspace calc run compile
    - run: npm --workspace app run test
      env:
        CI: true

  publish:
    if: ${{ github.repository == 'smogon/damage-calc' && (github.event_name == 'push' || github.event.workflow_run.conclusion == 'success') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4
    - run: npm install
    - name: Build
      run: node build
    - name: Upload artifact for GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        # Upload entire repository
        path: 'dist'
    - uses: actions/configure-pages@v5
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
