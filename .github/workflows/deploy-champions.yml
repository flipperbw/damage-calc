# Deploys the Champions Calc (app/) to GitHub Pages on every push to master.
# Gated to flipperbw/damage-calc so a hypothetical downstream fork of this
# fork doesn't try to deploy to a Pages site it doesn't own.

name: Deploy Champions

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel an older in-flight deploy if a newer push comes in.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.repository == 'flipperbw/damage-calc' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install across the workspace. Delete the lockfile first so npm
      # fully re-resolves on the Linux runner — the lockfile is generated
      # on Windows and omits the @rollup/rollup-linux-x64-gnu native
      # binary (npm 7+ bug, https://github.com/npm/cli/issues/4828).
      # Without this step, both `npm ci` and `npm install` would respect
      # the lockfile's platform-specific gaps and the build would crash
      # at "Cannot find module '@rollup/rollup-linux-x64-gnu'".
      - run: rm -f package-lock.json
      - run: npm install

      # Build the calc package first (app depends on the compiled output),
      # then build the Vite SPA into app/dist.
      - run: npm --workspace calc run compile
      - run: npm --workspace app run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      - id: deployment
        uses: actions/deploy-pages@v4
