<?xml version="1.0" encoding="UTF-8"?>
<!--
  1200×630 Open Graph banner for futuresight.gg. Picks up the app's
  dark palette + Ubuntu wordmark + sparkle mark so social previews
  feel native to the site. Referenced from index.html's og:image and
  twitter:image meta tags.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e25" />
      <stop offset="0.5" stop-color="#1c0f2e" />
      <stop offset="1" stop-color="#050714" />
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff" />
      <stop offset="1" stop-color="#5c8cff" />
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8ecff" />
      <stop offset="1" stop-color="#7c5cff" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.35" />
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Panel gradient background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Soft purple glow behind the wordmark -->
  <circle cx="270" cy="315" r="400" fill="url(#glow)" />

  <!-- Sparkle mark (concave 4-point) -->
  <g transform="translate(120, 200) scale(7.5)">
    <path d="M16 3 Q17 14 28 16 Q17 18 16 29 Q15 18 4 16 Q15 14 16 3 Z" fill="url(#mark)" />
  </g>

  <!-- FutureSight wordmark -->
  <text
    x="380"
    y="350"
    font-family="Ubuntu, system-ui, sans-serif"
    font-size="120"
    font-weight="700"
    fill="url(#word)"
    letter-spacing="-3"
  >FutureSight</text>

  <!-- Tagline -->
  <text
    x="380"
    y="420"
    font-family="Ubuntu, system-ui, sans-serif"
    font-size="32"
    font-weight="400"
    fill="#888fb5"
    letter-spacing="0.5"
  >Pokémon Champions damage calculator</text>

  <!-- Domain footer -->
  <text
    x="1130"
    y="595"
    text-anchor="end"
    font-family="Ubuntu, system-ui, sans-serif"
    font-size="28"
    font-weight="600"
    fill="#7c5cff"
  >futuresight.gg</text>
</svg>
